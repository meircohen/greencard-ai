name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Workers

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build with OpenNext
        run: npx opennextjs-cloudflare build
        env:
          NODE_ENV: production

      - name: Set Worker secrets
        run: |
          echo '${{ secrets.DATABASE_URL }}' | npx wrangler secret put DATABASE_URL
          echo '${{ secrets.NEXTAUTH_SECRET }}' | npx wrangler secret put NEXTAUTH_SECRET
          echo '${{ secrets.NEXT_PUBLIC_SITE_URL }}' | npx wrangler secret put NEXT_PUBLIC_SITE_URL
          echo '${{ secrets.ANTHROPIC_API_KEY }}' | npx wrangler secret put ANTHROPIC_API_KEY
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
