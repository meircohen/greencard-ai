name = "greencard-ai"
type = "javascript"
account_id = ""
workers_dev = true
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# Pages project configuration
pages_build_caching = true

# KV Namespaces
kv_namespaces = [
  { binding = "VISA_BULLETIN_CACHE", id = "", preview_id = "" },
  { binding = "SESSION_STORE", id = "", preview_id = "" },
  { binding = "RATE_LIMIT", id = "", preview_id = "" }
]

# R2 Bucket configuration
[[r2_buckets]]
binding = "DOCUMENTS"
bucket_name = "greencard-ai-documents"
preview_bucket_name = "greencard-ai-documents-preview"

# D1 Database configuration
[[d1_databases]]
binding = "ANALYTICS"
database_name = "greencard-ai-analytics"
database_id = ""
preview_database_id = ""

# Cron Triggers
[[triggers.crons]]
crons = ["0 1 1 * *"]  # 1st of every month at 1 AM

[[triggers.crons]]
crons = ["0 1 15 * *"]  # 15th of every month at 1 AM

# Environment variables
env.production.vars = { ENVIRONMENT = "production", LOG_LEVEL = "info" }
env.production.kv_namespaces = [
  { binding = "VISA_BULLETIN_CACHE", id = "" },
  { binding = "SESSION_STORE", id = "" },
  { binding = "RATE_LIMIT", id = "" }
]

env.development.vars = { ENVIRONMENT = "development", LOG_LEVEL = "debug" }
env.development.kv_namespaces = [
  { binding = "VISA_BULLETIN_CACHE", id = "" },
  { binding = "SESSION_STORE", id = "" },
  { binding = "RATE_LIMIT", id = "" }
]

# API tokens and secrets (add via wrangler secret)
# ANTHROPIC_API_KEY
# STRIPE_SECRET_KEY
# DATABASE_URL
# JWT_SECRET
